spring.application.name=recallops-backend

# Server Configuration
server.port=8080
server.shutdown=graceful

# Optimization for Java 25
spring.threads.virtual.enabled=true

# Spring AI Gemini Configuration
# These should be provided via environment variables in production
spring.ai.vertex.ai.gemini.project-id=${GOOGLE_CLOUD_PROJECT:}
spring.ai.vertex.ai.gemini.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.5-flash

# Structured Logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.level.com.recallops=DEBUG
logging.level.org.springframework.ai=DEBUG
logging.level.io.modelcontextprotocol=DEBUG
logging.level.org.springframework.web=INFO

# Actuator for Cloud Run Health Checks
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Custom RecallOps Config
kb.repo.owner=kavithamanoharan1897
kb.repo.name=recallops-engineering-docs
recallops.knowledge-base.repo-owner=${kb.repo.owner}
recallops.knowledge-base.repo-name=${kb.repo.name}

# Optional: Specific Reasoning Engine for Memory Bank
# If left as 'default', the system will attempt to use the default location context
kb.reasoning-engine.id=${REASONING_ENGINE_ID:default}

# MCP GitHub Client Configuration
spring.ai.mcp.client.stdio.connections.github.command=npx
spring.ai.mcp.client.stdio.connections.github.args=-y,@modelcontextprotocol/server-github
spring.ai.mcp.client.stdio.connections.github.env.GITHUB_PERSONAL_ACCESS_TOKEN=${GITHUB_TOKEN}
